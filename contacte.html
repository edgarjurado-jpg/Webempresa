<h2>Contacta amb nosaltres</h2>

<p>Si tens qualsevol dubte sobre el projecte o els serveis de l'empresa, pots enviar-nos un missatge mitjançant aquest formulari.</p>

<form>

<label for="nom">Nom</label><br>
<input type="text" id="nom" name="nom" required><br><br>

<label for="email">Correu electrònic</label><br>
<input type="email" id="email" name="email" required><br><br>

<label for="missatge">Missatge</label><br>
<textarea id="missatge" name="missatge" rows="5" required></textarea><br><br>

<button type="submit">Enviar</button>

</form>
